<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fitupGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background with gradient -->
  <rect width="512" height="512" rx="112" fill="url(#fitupGradient)"/>
  <!-- Dumbbell icon (white) -->
  <g transform="translate(256, 256) scale(1.6)">
    <!-- Left weight plates -->
    <rect x="-120" y="-40" width="20" height="80" rx="4" fill="white"/>
    <rect x="-145" y="-28" width="18" height="56" rx="4" fill="white"/>
    <rect x="-160" y="-16" width="12" height="32" rx="4" fill="white"/>
    <!-- Right weight plates -->
    <rect x="100" y="-40" width="20" height="80" rx="4" fill="white"/>
    <rect x="127" y="-28" width="18" height="56" rx="4" fill="white"/>
    <rect x="148" y="-16" width="12" height="32" rx="4" fill="white"/>
    <!-- Bar -->
    <rect x="-100" y="-7" width="200" height="14" rx="7" fill="white"/>
  </g>
</svg>
